[package]
name = "ooxmlsdk-test"
version.workspace = true
edition.workspace = true
publish = false

[features]
default = ["microsoft365", "parts"]
parts = ["ooxmlsdk/parts"]
microsoft365 = ["ooxmlsdk/microsoft365"]
strict = ["ooxmlsdk/strict"]

[dependencies]
ooxmlsdk = { workspace = true, default-features = false }

[dev-dependencies]
criterion = { workspace = true }

[[bench]]
name = "xml"
harness = false

[[bench]]
name = "packages"
harness = false
