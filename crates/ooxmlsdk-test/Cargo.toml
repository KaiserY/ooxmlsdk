[package]
name = "ooxmlsdk-test"
version.workspace = true
edition.workspace = true
publish = false
build = "build.rs"

[features]
default = ["microsoft365", "parts"]
parts = ["ooxmlsdk/parts"]
microsoft365 = ["ooxmlsdk/microsoft365"]
validators = ["ooxmlsdk/validators"]
mce = ["ooxmlsdk/mce"]

[dependencies]
ooxmlsdk = { workspace = true, default-features = false }

[build-dependencies]
serde_json = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
quick-xml = { workspace = true }
zip = { workspace = true }

[[bench]]
name = "perf"
harness = false
required-features = ["microsoft365", "parts"]
