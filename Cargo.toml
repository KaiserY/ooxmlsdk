[workspace]
resolver = "3"
members = [
  "crates/ooxmlsdk",
  "crates/ooxmlsdk-build",
  "crates/ooxmlsdk-derive",
  "crates/ooxmlsdk-pdf",
  "crates/ooxmlsdk-test",
]

[workspace.package]
version = "0.6.2"
edition = "2024"
rust-version = "1.89"
authors = ["KaiserY"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/KaiserY/ooxmlsdk"
documentation = "https://docs.rs/ooxmlsdk"
description = "Open XML SDK for Rust"
keywords = ["xml", "office", "docx", "pptx", "xlsx"]
categories = ["parser-implementations"]
readme = "README.md"

[workspace.dependencies]
ooxmlsdk = { version = "0.6.2", path = "crates/ooxmlsdk", default-features = false }
ooxmlsdk-build = { version = "0.6.2", path = "crates/ooxmlsdk-build" }
ooxmlsdk-derive = { version = "0.6.2", path = "crates/ooxmlsdk-derive" }
ooxmlsdk-pdf = { version = "0.6.2", path = "crates/ooxmlsdk-pdf" }
ooxmlsdk-test = { version = "0.6.2", path = "crates/ooxmlsdk-test" }
base64 = "0.22.1"
quick-xml = "0.39.3"
regex = "1.12.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_derive = "1.0.228"
serde_json = "1.0.149"
quote = "1.0.45"
syn = { version = "2.0.117", features = ["full"] }
prettyplease = "0.2.37"
proc-macro2 = "1.0.106"
heck = "0.5.0"
zip = { version = "8.6.0", default-features = false, features = ["deflate"] }
thiserror = "2.0.18"
criterion = "0.8.2"
crc32fast = "1.5.0"
pprof = { version = "0.15", features = ["criterion", "flamegraph"] }
walkdir = "2.5.0"
toml = "1.1"
fontdb = "0.23"
krilla = { git = "https://github.com/LaurenzV/krilla", rev = "88483e2", default-features = false, features = ["raster-images", "pdf", "simple-text"] }
krilla-svg = { git = "https://github.com/LaurenzV/krilla", rev = "88483e2" }

[profile.dev]
incremental = false
