[workspace]
resolver = "3"
members = [
  "crates/ooxmlsdk",
  "crates/ooxmlsdk-build",
  "crates/ooxmlsdk-derive",
  "crates/ooxmlsdk-test"
]

[workspace.package]
version = "0.6.0"
edition = "2024"
rust-version = "1.88"
authors = ["KaiserY"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/KaiserY/ooxmlsdk"
documentation = "https://docs.rs/ooxmlsdk"
description = "Open XML SDK for Rust"
keywords = ["xml", "office", "docx", "pptx", "xlsx"]
categories = ["parser-implementations"]
readme = "README.md"

[workspace.dependencies]
ooxmlsdk = { version = "0.6.0", path = "crates/ooxmlsdk", default-features = false }
ooxmlsdk-build = { version = "0.6.0", path = "crates/ooxmlsdk-build" }
ooxmlsdk-derive = { version = "0.6.0", path = "crates/ooxmlsdk-derive" }
ooxmlsdk-test = { version = "0.6.0", path = "crates/ooxmlsdk-test" }
base64 = "0.22.1"
quick-xml = "0.39.2"
regex = "1.12.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_derive = "1.0.228"
serde_json = "1.0.149"
quote = "1.0.45"
syn = "2.0.117"
prettyplease = "0.2.37"
proc-macro2 = "1.0.106"
heck = "0.5.0"
zip = { version = "8.6.0", default-features = false, features = ["deflate"] }
thiserror = "2.0.18"
criterion = "0.8.2"
pprof = { version = "0.15", features = ["criterion", "flamegraph"] }
